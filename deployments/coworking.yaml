apiVersion: v1
kind: Service
metadata:
  name: coworking
spec:
  type: LoadBalancer
  selector:
    service: coworking
  ports:
    - name: "5153"
      protocol: TCP
      port: 5153
      targetPort: 5153
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coworking
  labels:
    name: coworking
spec:
  replicas: 1
  selector:
    matchLabels:
      service: coworking
  template:
    metadata:
      labels:
        service: coworking
    spec:
      containers:
        - name: coworking
          # Replace with your ECR image URI, e.g.
          # 123456789012.dkr.ecr.us-east-1.amazonaws.com/coworking-analytics:1.0.1
          image: <DOCKER_IMAGE_URI_FROM_ECR>
          imagePullPolicy: Always
          ports:
            - containerPort: 5153
          livenessProbe:
            httpGet:
              path: /health_check
              port: 5153
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readiness_check
              port: 5153
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          envFrom:
            - configMapRef:
                name: coworking-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coworking-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      restartPolicy: Always
